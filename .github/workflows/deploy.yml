# Gemini 3 generated
name: Deploy Zola site to GitHub Pages
on:
  push:
    branches:
      - main # 监听 main 分支的推送

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install and Build Zola
        uses: shalozz/zola-deploy-action@v0.19.1
        env:
          # 注意：这里不再需要配置 PAGES_BRANCH
          BUILD_DIR: public
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # 官方步骤：上传构建产物
        with:
          path: ./public

  deploy:
    needs: build
    permissions:
      pages: write # 必须有写权限
      id-token: write # 必须有 ID token 权限
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 官方步骤：执行部署
