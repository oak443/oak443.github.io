# Gemini 3 生成
name: Build and deploy Zola website
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.1
        with:
          submodules: recursive

      # 1. 运行 Zola 构建容器
      - name: Build Zola
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/getzola/zola:v0.22.1 build

      # 【修复】将 public 文件夹的所有权改回当前用户
      - name: Fix permissions
        run: sudo chown -R $USER:$USER public
      
      # 2. 准备 Node 环境并执行数学公式转换
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 开启缓存加速构建
      - name: Pre-render Math
        run: |
          npm install
          node scripts/render-math.mjs
      
      # 3. 使用官方 Action 上传处理后的 public 文件夹
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4